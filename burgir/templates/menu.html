{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burgir - Menu</title>
    {% tailwind_css %}
</head>
<body class="bg-yellow-50 min-h-screen">

    <nav class="bg-yellow-500 p-4">
        <div class="container mx-auto flex justify-between">
            <a href="/" class="text-white text-2xl font-bold">🍔 Burgir</a>
            <a href="/menu/" class="text-white text-lg font-semibold">Menu</a>
        </div>
    </nav>

    <div class="container mx-auto mt-10 px-4">
        <h1 class="text-4xl font-bold text-yellow-500 text-center mb-8">Our Menu</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

            <div class="bg-white rounded-xl shadow p-6 text-center">
                <div class="text-5xl mb-4">🍔</div>
                <h2 class="text-xl font-bold text-gray-700">Classic Burgir</h2>
                <p class="text-gray-400 mt-2">Beef patty, lettuce, tomato</p>
                <p class="text-yellow-500 font-bold mt-4">₱150</p>
            </div>

            <div class="bg-white rounded-xl shadow p-6 text-center">
                <div class="text-5xl mb-4">🍗</div>
                <h2 class="text-xl font-bold text-gray-700">Chicken Burgir</h2>
                <p class="text-gray-400 mt-2">Crispy chicken, mayo, pickles</p>
                <p class="text-yellow-500 font-bold mt-4">₱130</p>
            </div>

            <div class="bg-white rounded-xl shadow p-6 text-center">
                <div class="text-5xl mb-4">🧀</div>
                <h2 class="text-xl font-bold text-gray-700">Cheese Burgir</h2>
                <p class="text-gray-400 mt-2">Double cheese, beef patty</p>
                <p class="text-yellow-500 font-bold mt-4">₱170</p>
            </div>

        </div>
    </div>

</body>
</html>
